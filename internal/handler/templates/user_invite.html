{{define "content"}}
<div class="mb-6">
    <a href="/settings/users" class="text-sm text-stone-600 hover:text-primary transition-colors inline-flex items-center gap-1">
        <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Team
    </a>
</div>

<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold tracking-tight text-stone-900 flex items-center gap-2 mb-6">
        <i data-lucide="user-plus" class="w-6 h-6 text-primary"></i>
        Invite User
    </h1>

    {{if .Error}}
    <div class="mb-4 p-4 bg-red-50 border border-red-200 rounded-lg text-sm text-red-800 flex items-center gap-2">
        <i data-lucide="alert-circle" class="w-4 h-4 text-red-600"></i>
        {{.Error}}
    </div>
    {{end}}

    <form method="POST" action="/settings/users/invite" class="bg-surface border border-stone-200 rounded-2xl shadow-sm p-6 space-y-5">
        <div>
            <label for="email" class="block text-sm font-medium text-stone-700 mb-1.5">Email Address</label>
            <input type="email" id="email" name="email" required value="{{.FormEmail}}"
                   class="block w-full rounded-lg border-0 py-2.5 px-3 bg-white text-stone-900 shadow-sm ring-1 ring-inset ring-stone-200 focus:ring-2 focus:ring-inset focus:ring-primary text-sm"
                   placeholder="user@example.com">
            <p class="text-xs text-stone-500 mt-1">If the user doesn't have an account, one will be created.</p>
        </div>

        <div>
            <label for="full_name" class="block text-sm font-medium text-stone-700 mb-1.5">Full Name</label>
            <input type="text" id="full_name" name="full_name" value="{{.FormName}}"
                   class="block w-full rounded-lg border-0 py-2.5 px-3 bg-white text-stone-900 shadow-sm ring-1 ring-inset ring-stone-200 focus:ring-2 focus:ring-inset focus:ring-primary text-sm"
                   placeholder="John Doe">
            <p class="text-xs text-stone-500 mt-1">Required only for new accounts.</p>
        </div>

        <div>
            <label for="role" class="block text-sm font-medium text-stone-700 mb-1.5">Role</label>
            <select id="role" name="role" required
                    class="block w-full rounded-lg border-0 py-2.5 px-3 bg-white text-stone-900 shadow-sm ring-1 ring-inset ring-stone-200 focus:ring-2 focus:ring-inset focus:ring-primary text-sm appearance-none cursor-pointer">
                {{range .AvailableRoles}}
                {{if ne .Name "owner"}}
                <option value="{{.Name}}">{{.Name}} &mdash; {{.Description}}</option>
                {{end}}
                {{end}}
            </select>
        </div>

        <div class="pt-2">
            <button type="submit" class="w-full inline-flex items-center justify-center gap-2 bg-primary hover:bg-primary-hover text-white px-4 py-2.5 rounded-lg text-sm font-semibold shadow-sm transition-all focus:ring-2 focus:ring-primary focus:outline-none active:scale-95">
                <i data-lucide="send" class="w-4 h-4"></i> Invite User
            </button>
        </div>
    </form>
</div>
{{end}}

{{template "layout" .}}
