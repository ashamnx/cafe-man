{{define "content"}}
<div class="mb-6">
    <h1 class="text-2xl font-bold tracking-tight text-stone-900 flex items-center gap-2">
        <i data-lucide="building-2" class="w-6 h-6 text-primary"></i>
        Organization Settings
    </h1>
    <p class="text-sm text-stone-600 mt-1">{{.Org.Name}}</p>
</div>

<div class="bg-surface border border-stone-200 rounded-2xl shadow-sm p-6 max-w-2xl">
    <h2 class="text-sm font-semibold text-stone-900 mb-1">Logo</h2>
    <p class="text-xs text-stone-500 mb-4">Shown in the header instead of the default brand. PNG, JPEG or WebP; recommended width 400-1200px.</p>

    {{if .Org.LogoImageKey}}
    <div class="flex items-center gap-4 mb-4 p-4 rounded-lg bg-stone-50 border border-stone-200">
        <img src="{{imageURL .Org.LogoImageKey}}" alt="{{.Org.Name}} logo" class="h-12 max-w-[240px] object-contain">
        <form method="POST" action="/settings/organization/logo/remove" hx-post="/settings/organization/logo/remove" hx-confirm="Remove current logo?" class="ml-auto">
            <button type="submit" class="inline-flex items-center gap-1 rounded-md bg-red-500/10 hover:bg-red-500/20 px-3 py-1.5 text-xs font-semibold text-red-500 transition-colors">
                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i> Remove
            </button>
        </form>
    </div>
    {{end}}

    <form method="POST" action="/settings/organization/logo" enctype="multipart/form-data" hx-post="/settings/organization/logo" hx-encoding="multipart/form-data" class="space-y-3">
        <input type="file" name="logo" accept="image/png,image/jpeg,image/webp" required
               class="block w-full text-sm text-stone-700 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-primary/10 file:text-primary hover:file:bg-primary/20 transition-all">
        <button type="submit" class="inline-flex items-center gap-2 rounded-lg bg-primary px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-primary-hover transition-colors">
            <i data-lucide="upload" class="w-4 h-4"></i> Upload Logo
        </button>
    </form>
</div>
{{end}}

{{template "layout" .}}
