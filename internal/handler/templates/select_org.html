{{define "content"}}
<div class="max-w-md w-full mx-auto mt-12 sm:mt-24 px-4">
    <div class="bg-surface/50 sm:bg-surface border border-stone-200 sm:border-stone-300 rounded-2xl shadow-xl backdrop-blur-xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold tracking-tight text-stone-900 mb-2">Select Organization</h1>
            <p class="text-sm text-stone-600">Choose which cafe you want to access</p>
        </div>
        
        <form method="POST" action="/select-org" class="space-y-6">
            <div class="space-y-3 relative">
                {{range .Orgs}}
                <label class="relative flex items-center p-4 cursor-pointer rounded-xl border border-stone-300 bg-stone-100 hover:bg-white focus-within:ring-2 focus-within:ring-primary focus-within:border-transparent transition-all overflow-hidden group">
                    <input type="radio" name="org_id" value="{{.ID}}" required class="sr-only peer">
                    <div class="flex-shrink-0 w-5 h-5 rounded-full border border-stone-300 flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary mr-3 transition-colors">
                        <div class="w-2 h-2 rounded-full bg-white opacity-0 peer-checked:opacity-100 transition-opacity"></div>
                    </div>
                    <span class="text-stone-900 font-medium group-hover:text-blue-100 transition-colors">{{.Name}}</span>
                    
                    <!-- Peer checked highlight border (absolute) -->
                    <div class="absolute inset-0 border-2 border-primary rounded-xl opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity"></div>
                </label>
                {{end}}
            </div>
            
            <button type="submit" class="w-full flex justify-center items-center gap-2 rounded-lg bg-primary px-4 py-3 text-sm font-semibold text-white shadow-sm hover:bg-primary-hover focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary transition-all active:scale-[0.98]">
                Continue
                <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
        </form>
    </div>
</div>
{{end}}

{{template "layout" .}}
