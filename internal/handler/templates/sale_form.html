{{define "content"}}
<div class="mb-6">
    <a href="/sales" class="inline-flex items-center gap-1 text-sm text-stone-600 hover:text-stone-900 transition-colors">
        <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Sales
    </a>
</div>

<div class="mb-6">
    <h1 class="text-2xl font-bold tracking-tight text-stone-900 flex items-center gap-2">
        <i data-lucide="shopping-cart" class="w-6 h-6 text-primary"></i>
        Record Sales
    </h1>
    <p class="text-sm text-stone-600 mt-1">Enter your daily sales by menu item. Stock will be deducted when you apply the entry.</p>
</div>

<div class="bg-surface border border-stone-200 rounded-2xl shadow-sm p-6 sm:p-8 max-w-3xl">
    <form method="POST" hx-post="/sales" action="/sales" class="space-y-6">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div>
                <label for="sale_date" class="block text-sm font-medium text-stone-700 mb-2">Sale Date</label>
                <input type="date" id="sale_date" name="sale_date" required
                       class="block w-full rounded-lg border-0 py-2.5 px-3.5 bg-white text-stone-900 shadow-sm ring-1 ring-inset ring-stone-200 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm">
            </div>
            <div>
                <label for="notes" class="block text-sm font-medium text-stone-700 mb-2">Notes (optional)</label>
                <input type="text" id="notes" name="notes" placeholder="e.g., Busy weekend day"
                       class="block w-full rounded-lg border-0 py-2.5 px-3.5 bg-white text-stone-900 shadow-sm ring-1 ring-inset ring-stone-200 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm">
            </div>
        </div>

        <!-- Line Items -->
        <div class="pt-4 border-t border-stone-200">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-sm font-semibold text-stone-700 flex items-center gap-2">
                    <i data-lucide="list" class="w-4 h-4"></i> Items Sold
                </h3>
                <button type="button" id="add-item-btn" class="inline-flex items-center gap-1 px-3 py-1.5 rounded-lg bg-stone-100 text-stone-700 border border-stone-200 hover:bg-stone-200 text-xs font-semibold transition-colors">
                    <i data-lucide="plus" class="w-3 h-3"></i> Add Item
                </button>
            </div>

            <div class="hidden sm:grid sm:grid-cols-12 gap-2 mb-2 px-1">
                <div class="col-span-7 text-[10px] uppercase tracking-wider font-semibold text-stone-500">Menu Item</div>
                <div class="col-span-3 text-[10px] uppercase tracking-wider font-semibold text-stone-500">Quantity Sold</div>
                <div class="col-span-2"></div>
            </div>

            <div id="items-container"></div>
        </div>

        <div class="pt-4 border-t border-stone-200">
            <div class="flex flex-col-reverse sm:flex-row items-center gap-3">
                <a href="/sales" class="w-full sm:w-auto inline-flex items-center justify-center rounded-lg px-6 py-2.5 text-sm font-semibold text-stone-700 hover:bg-stone-100 transition-colors">
                    Cancel
                </a>
                <button type="submit" class="w-full sm:w-auto sm:ml-auto inline-flex items-center justify-center gap-2 rounded-lg bg-primary px-6 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-primary-hover transition-all">
                    <i data-lucide="save" class="w-4 h-4"></i> Save as Draft
                </button>
            </div>
        </div>
    </form>
</div>

<script>
(function() {
    var menuItems = [
        {{range .MenuItems}}
        {id: "{{.ID}}", name: "{{.Name}}", price: {{.SellingPrice}}},
        {{end}}
    ];

    var container = document.getElementById('items-container');
    var addBtn = document.getElementById('add-item-btn');
    var rowCount = 0;

    function createRow() {
        rowCount++;
        var div = document.createElement('div');
        div.className = 'grid grid-cols-1 sm:grid-cols-12 gap-2 mb-3 items-center';
        div.id = 'row-' + rowCount;

        var options = '<option value="">Select menu item...</option>';
        for (var i = 0; i < menuItems.length; i++) {
            options += '<option value="' + menuItems[i].id + '">' + menuItems[i].name + '</option>';
        }

        div.innerHTML =
            '<div class="sm:col-span-7">' +
                '<label class="sm:hidden text-[10px] uppercase tracking-wider font-semibold text-stone-500 mb-1 block">Menu Item</label>' +
                '<select name="menu_item_id" required class="block w-full rounded-md border-0 py-2 px-3 bg-white text-stone-900 shadow-sm ring-1 ring-inset ring-stone-200 focus:ring-2 focus:ring-inset focus:ring-primary text-sm appearance-none cursor-pointer">' +
                    options +
                '</select>' +
            '</div>' +
            '<div class="sm:col-span-3">' +
                '<label class="sm:hidden text-[10px] uppercase tracking-wider font-semibold text-stone-500 mb-1 block">Quantity</label>' +
                '<input type="number" name="quantity" min="1" step="1" required placeholder="0" class="block w-full rounded-md border-0 py-2 px-3 bg-white text-stone-900 shadow-sm ring-1 ring-inset ring-stone-200 focus:ring-2 focus:ring-inset focus:ring-primary text-sm font-mono">' +
            '</div>' +
            '<div class="sm:col-span-2 flex justify-end">' +
                '<button type="button" onclick="this.closest(\'[id^=row-]\').remove()" class="inline-flex items-center justify-center w-8 h-8 rounded-md text-stone-500 hover:text-red-500 hover:bg-red-50 transition-colors">' +
                    '<i data-lucide="trash-2" class="w-4 h-4"></i>' +
                '</button>' +
            '</div>';

        container.appendChild(div);
        if (window.lucide) lucide.createIcons();
    }

    addBtn.addEventListener('click', createRow);

    // Start with one row.
    createRow();

    // Set today's date as default.
    var dateInput = document.getElementById('sale_date');
    if (dateInput && !dateInput.value) {
        dateInput.value = new Date().toISOString().split('T')[0];
    }
})();
</script>
{{end}}

{{template "layout" .}}
