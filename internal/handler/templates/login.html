{{define "content"}}
<div class="max-w-md w-full mx-auto mt-12 sm:mt-24 px-4">
    <div class="bg-surface/50 sm:bg-surface border border-stone-200 sm:border-stone-300 rounded-2xl shadow-xl backdrop-blur-xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold tracking-tight text-stone-900 mb-2">Welcome Back</h1>
            <p class="text-sm text-stone-600">Sign in to your Searlo Cafe account</p>
        </div>
        
        {{if .Error}}
        <div class="bg-red-500/10 border border-red-500/20 text-red-400 p-4 rounded-lg text-sm mb-6 flex items-start gap-3">
            <i data-lucide="alert-circle" class="w-5 h-5 shrink-0 mt-0.5"></i>
            <div>{{.Error}}</div>
        </div>
        {{end}}

        <form method="POST" action="/login" class="space-y-5">
            <div>
                <label for="email" class="block text-sm font-medium text-stone-700 mb-1.5">Email address</label>
                <input type="email" id="email" name="email" value="{{.Email}}" required autofocus
                    class="block w-full rounded-lg border-0 py-2.5 px-3.5 bg-white text-stone-900 shadow-sm ring-1 ring-inset ring-stone-200 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm sm:leading-6 placeholder:text-stone-500 transition-shadow">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-stone-700 mb-1.5">Password</label>
                <input type="password" id="password" name="password" required
                    class="block w-full rounded-lg border-0 py-2.5 px-3.5 bg-white text-stone-900 shadow-sm ring-1 ring-inset ring-stone-200 focus:ring-2 focus:ring-inset focus:ring-primary sm:text-sm sm:leading-6 placeholder:text-stone-500 transition-shadow">
            </div>
            <button type="submit" class="w-full flex justify-center items-center gap-2 rounded-lg bg-primary px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-primary-hover focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary transition-all active:scale-[0.98]">
                Sign In
                <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-stone-600">
            Don't have an account? 
            <a href="/register" class="font-semibold text-primary hover:text-blue-400 transition-colors">Create one now</a>
        </p>
    </div>
</div>
{{end}}

{{template "layout" .}}
